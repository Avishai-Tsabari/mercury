name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Run checks (typecheck + lint + tests + custom gates)
        run: bun run check

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  # npm publish is intentionally NOT automated here.
  # Publishing is done manually by a maintainer from a local machine
  # (npm 2FA requires an interactive OTP). See docs/runbooks/publish-checklist.md.
