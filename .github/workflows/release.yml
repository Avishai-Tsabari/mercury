name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Run checks (typecheck + lint + tests + custom gates)
        run: bun run check

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      # No registry-url: setup-node's registry-url writes an .npmrc with a
      # _authToken line that hijacks auth and blocks OIDC. Trusted publishing
      # only engages when no token is configured.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Trusted publishing needs npm >= 11.5.1; pin to 11.x to avoid
      # broken sigstore in npm 12.x (NODE-1234).
      - run: npm install -g npm@11

      # No NODE_AUTH_TOKEN: identity comes from OIDC via the trusted
      # publisher configured on npmjs.com (package Settings -> Trusted
      # Publisher: repo Avishai-Tsabari/mercury, workflow release.yml, no
      # environment).
      # Provenance is attached automatically by trusted publishing (no
      # --provenance flag needed); it requires a PUBLIC source repo.
      - name: Publish to npm (trusted publishing)
        run: npm publish
