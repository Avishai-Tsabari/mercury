name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Run checks (typecheck + lint + tests + custom gates)
        run: bun run check

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      # No registry-url: setup-node's registry-url writes an .npmrc with a
      # _authToken line that hijacks auth and blocks OIDC. Trusted publishing
      # only engages when no token is configured.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Trusted publishing needs npm >= 11.5.1; ensure a recent CLI.
      - run: npm install -g npm@latest

      - name: Diagnose OIDC preconditions
        run: |
          echo "npm path: $(which npm)"
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "registry: $(npm config get registry)"
          echo "userconfig: ${NPM_CONFIG_USERCONFIG:-<unset>}"
          echo "OIDC request url present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "OIDC request token present: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"

      # No NODE_AUTH_TOKEN: identity comes from OIDC via the trusted
      # publisher configured on npmjs.com. Provenance is attached automatically.
      # Verbose to surface the OIDC token-exchange handshake on failure.
      - name: Publish to npm (trusted publishing)
        run: npm publish --loglevel verbose
